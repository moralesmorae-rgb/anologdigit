<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electrónica Analógica - Profesor Eduardo</title>
    <style>
        /* --- ESTILOS LIMPIOS Y DIRECTOS --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* ENCABEZADO */
        header {
            background-color: #000000;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            border-bottom: 3px solid #ffcc00;
            position: absolute;
            top: 0;
            left: 0;
        }

        header h1 {
            margin: 0;
            color: #ffcc00;
            font-size: 1.8rem;
        }

        header p {
            margin: 5px 0 0 0;
            color: #aaaaaa;
            font-size: 0.9rem;
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            width: 90%;
            max-width: 450px;
            background-color: #1e1e1e;
            padding: 40px 30px;
            border-radius: 12px;
            border-top: 5px solid #ffcc00;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 100px; /* Espacio para el header */
            margin-bottom: 80px; /* Espacio para que no choque con el botón de volver */
        }

        .container h2 {
            margin-top: 0;
            color: #ffffff;
            margin-bottom: 30px;
        }

        /* BOTONES DE OPCIONES */
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Separación un poco menor para que quepan bien los 4 */
        }

        .btn {
            display: block;
            background-color: transparent;
            border: 2px solid #ffcc00;
            color: #ffcc00;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s ease-in-out;
        }

        .btn:hover {
            background-color: #ffcc00;
            color: #000000;
            transform: scale(1.02);
        }

        /* BOTÓN INFERIOR IZQUIERDO */
        .btn-volver {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: inline-block;
            background-color: #1e1e1e;
            border: 2px solid #ffcc00;
            color: #ffcc00;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s ease-in-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 9999; /* Garantiza que siempre se vea */
        }

        .btn-volver:hover {
            background-color: #ffcc00;
            color: #000000;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- ENCABEZADO -->
    <header>
        <h1>Electrónica Analógica</h1>
        <p>Profesor Eduardo • IPCHILE</p>
    </header>

    <!-- SECCIÓN DE INGRESO (4 OPCIONES) -->
    <main class="container">
        <h2>Selecciona un componente</h2>
        
        <div class="options">
            <a href="resistencia.html" class="btn">⚡ Resistencia</a>
            <a href="condensador.html" class="btn">🔋 Condensador</a>
            <a href="bobina.html" class="btn">🧲 Bobina</a>
            <a href="semiconductores.html" class="btn">🔌 Semiconductores</a>
        </div>
    </main>

    <!-- BOTÓN INFERIOR IZQUIERDO PARA VOLVER -->
    <a href="index.html" class="btn-volver">⬅️ Volver al Inicio</a>

</body>
</html>
